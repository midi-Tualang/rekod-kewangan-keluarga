<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekod Kewangan Keluarga</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2, h3 { margin-top: 0; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button.btn-accent { background-color: var(--accent); }
        button.btn-danger { background-color: var(--danger); }
        .hidden { display: none !important; }
        
        #login-section { text-align: center; margin-top: 50px; }
        #pin-input { text-align: center; font-size: 24px; letter-spacing: 5px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;}
        .balance-box { text-align: center; background-color: var(--primary); color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .balance-box h1 { margin: 10px 0; font-size: 32px; }
        
        /* Gaya Pop-up (Modal) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: var(--card-bg);
            padding: 20px; border-radius: 12px;
            width: 90%; max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 90vh; overflow-y: auto;
        }
        .close-btn {
            background-color: transparent; color: var(--danger);
            border: none; text-align: right; padding: 0;
            font-size: 16px; margin-bottom: 10px; font-weight: bold;
        }

        /* Gaya Bar Kemajuan (Progress Bar) & Transaksi */
        .progress-container { width: 100%; background-color: #ecf0f1; border-radius: 8px; margin-top: 5px; overflow: hidden; height: 12px; }
        .progress-bar { height: 100%; border-radius: 8px; transition: width 0.4s ease; }
        .bg-green { background-color: var(--accent); }
        .bg-yellow { background-color: var(--warning); }
        .bg-red { background-color: var(--danger); }
        
        .transaksi-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center;}
        .transaksi-item:last-child { border-bottom: none; }
        .text-danger { color: var(--danger); font-weight: bold; }
        .text-success { color: var(--accent); font-weight: bold; }
        .text-primary { color: var(--primary); font-weight: bold; }
        .transaksi-detail { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-section" class="card">
        <h2>Kewangan Keluarga</h2>
        <p>Sila masukkan PIN untuk akses</p>
        <input type="password" id="pin-input" placeholder="••••" maxlength="4">
        <button onclick="logMasuk()">Log Masuk</button>
        <p id="login-status" style="color: red;"></p>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="header">
            <h3 id="user-role">Profil: Pengguna</h3>
            <button onclick="logKeluar()" style="width: auto; padding: 8px 12px; background: #95a5a6;">Log Keluar</button>
        </div>

        <div class="balance-box">
            <p style="margin:0; opacity: 0.8;">Baki Kewangan Semasa</p>
            <h1 id="baki-semasa">RM 0.00</h1>
        </div>

        <div id="tindakan-user" class="card hidden">
            <h3 style="margin-bottom: 15px;">Tindakan Pantas</h3>
            <button class="btn-accent" onclick="bukaModalTransaksi('Bayar Hutang')">+ Bayar Hutang (RM500)</button>
            <button onclick="bukaModalTransaksi('Perbelanjaan')">Catat Perbelanjaan / Pendapatan</button>
        </div>

        <div id="tindakan-admin" class="card hidden">
            <h3 style="margin-bottom: 15px;">Panel Kawalan Abah</h3>
            <button class="btn-danger" onclick="alert('Borang pengeluaran dana akan dibuka')">- Rekod Pengeluaran Dana</button>
            <button onclick="alert('Fungsi cetak dan reset akan dijalankan')">Urus Sistem & Cetak PDF</button>
        </div>

        <div class="card">
            <h3>Status Dana Terkumpul</h3>
            <ul style="list-style: none; padding: 0; line-height: 1.8;" id="senarai-dana">
                </ul>
        </div>

        <div class="card">
            <h3>Status Bajet Kategori</h3>
            <div id="senarai-bajet">
                </div>
        </div>

        <div class="card">
            <h3>Transaksi Terkini</h3>
            <div id="senarai-transaksi">
                </div>
        </div>
        
    </div>
</div>

<div id="modal-transaksi" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="tutupModal()">✖ Batal</button>
        <h3 id="tajuk-modal">Catat Transaksi</h3>
        
        <label>Jenis:</label>
        <select id="input-jenis" onchange="kemasKiniKategori()">
            <option value="Perbelanjaan">Perbelanjaan (Keluar)</option>
            <option value="Pendapatan">Pendapatan (Masuk)</option>
            <option value="Bayar Hutang">Bayar Hutang Abah</option>
        </select>

        <label>Kategori:</label>
        <select id="input-kategori">
            </select>

        <label>Jumlah (RM):</label>
        <input type="number" id="input-jumlah" placeholder="Contoh: 50.00" step="0.01">

        <label>Nota Ringkas:</label>
        <input type="text" id="input-nota" placeholder="Contoh: Beli barang dapur">

        <button class="btn-accent" onclick="hantarDataTransaksi()" id="btn-hantar">Simpan Rekod</button>
        <p id="status-hantar" style="text-align:center; font-size:14px; margin-top:10px;"></p>
    </div>
</div>    

<script>
    // URL WEB APP GAS
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybsw0VFwZhmtzDF9sYae9KYkdUROpgV5JyKMWnJLjXhFiW4myZ_l1Q8UadnXcBvnw/exec"; 
    
    let pinSemasa = "";
    let senaraiKategoriGlobal = [];

    function logMasuk() {
        const pin = document.getElementById('pin-input').value;
        const statusText = document.getElementById('login-status');
        
        if(pin.length < 4) {
            statusText.innerText = "Sila masukkan 4 digit PIN.";
            return;
        }

        statusText.innerText = "Memeriksa akses...";
        
        fetch(`${GAS_URL}?pin=${pin}&action=getData`)
            .then(response => response.json())
            .then(data => {
                if(data.status === "SUCCESS") {
                    pinSemasa = pin;
                    paparDashboard(data);
                } else {
                    statusText.innerText = "PIN Salah. Cuba lagi.";
                }
            })
            .catch(error => {
                statusText.innerText = "Ralat sambungan. Pastikan URL betul.";
            });
    }

    function paparDashboard(data) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        
        const peranan = data.peranan;
        document.getElementById('user-role').innerText = peranan === "ADMIN" ? "👑 Panel Kawalan Abah" : "👤 Hasif & Fatini";
        
        document.getElementById('baki-semasa').innerText = "RM " + parseFloat(data.ringkasan["Baki Semasa"] || 0).toFixed(2);

        // 1. Papar Dana
        const senaraiDana = document.getElementById('senarai-dana');
        senaraiDana.innerHTML = `
            <li>🚗 Servis Veloz: <b>RM ${parseFloat(data.ringkasan["Dana Servis Veloz"] || 0).toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li>🚗 Servis Persona: <b>RM ${parseFloat(data.ringkasan["Dana Servis Persona"] || 0).toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li>📄 Roadtax Veloz: <b>RM ${parseFloat(data.ringkasan["Dana Roadtax Veloz"] || 0).toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li>📄 Roadtax Persona: <b>RM ${parseFloat(data.ringkasan["Dana Roadtax Persona"] || 0).toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li style="color: var(--accent); font-size: 18px; margin-top: 10px;">💰 <b>Tabungan Masa Depan: RM ${parseFloat(data.ringkasan["Tabungan Masa Depan"] || 0).toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
        `;

        // Susun akses panel
        if(peranan === "ADMIN") {
            document.getElementById('tindakan-admin').classList.remove('hidden');
            document.getElementById('tindakan-user').classList.add('hidden');
        } else {
            document.getElementById('tindakan-user').classList.remove('hidden');
            document.getElementById('tindakan-admin').classList.add('hidden');
        }

        senaraiKategoriGlobal = data.kategori || [];
        const sejarahTransaksi = data.transaksi || [];

        // 2. Kira dan Papar Bar Kemajuan Kategori
        let belanjaKategori = {};
        // Tetapkan nilai 0 untuk setiap kategori pada awalnya
        senaraiKategoriGlobal.forEach(k => { belanjaKategori[k.nama] = 0; });
        
        // Campurkan jumlah perbelanjaan dari transaksi terkini
        sejarahTransaksi.forEach(t => {
            if (t.jenis === "Perbelanjaan" && belanjaKategori[t.kategori] !== undefined) {
                belanjaKategori[t.kategori] += parseFloat(t.jumlah);
            }
        });

        let htmlBajet = "";
        if(senaraiKategoriGlobal.length === 0) {
            htmlBajet = "<p style='color:#7f8c8d; font-size: 14px;'>Tiada kategori ditetapkan.</p>";
        } else {
            senaraiKategoriGlobal.forEach(kat => {
                let had = parseFloat(kat.had);
                let telahBelanja = belanjaKategori[kat.nama];
                let peratus = had > 0 ? (telahBelanja / had) * 100 : 0;
                let warnaKelas = "bg-green"; // Default cermat
                
                if (peratus >= 100) {
                    warnaKelas = "bg-red";
                    peratus = 100; // Hadkan visual bar pada 100% supaya tak pecah kotak
                } else if (peratus >= 75) {
                    warnaKelas = "bg-yellow";
                }

                htmlBajet += `
                    <div style="margin-bottom: 18px;">
                        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px;">
                            <b>${kat.nama}</b>
                            <span>RM ${telahBelanja.toFixed(2)} / <span style="color:#7f8c8d;">RM ${had.toFixed(2)}</span></span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar ${warnaKelas}" style="width: ${peratus}%"></div>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('senarai-bajet').innerHTML = htmlBajet;

        // 3. Papar Senarai Transaksi Terkini
        let htmlTransaksi = "";
        if (sejarahTransaksi.length === 0) {
            htmlTransaksi = "<p style='text-align:center; color:#7f8c8d; font-size:14px;'>Belum ada rekod transaksi.</p>";
        } else {
            sejarahTransaksi.forEach(t => {
                let warna = "text-primary";
                let simbol = "";
                
                if (t.jenis === "Pendapatan") { warna = "text-success"; simbol = "+"; } 
                else if (t.jenis === "Perbelanjaan") { warna = "text-danger"; simbol = "-"; }
                
                htmlTransaksi += `
                    <div class="transaksi-item">
                        <div>
                            <div style="font-weight:bold; font-size: 14px;">${t.kategori}</div>
                            <div class="transaksi-detail">${t.tarikh} • ${t.nota || 'Tiada nota'}</div>
                        </div>
                        <div class="${warna}">
                            ${simbol}RM ${parseFloat(t.jumlah).toFixed(2)}
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('senarai-transaksi').innerHTML = htmlTransaksi;
    }

    function logKeluar() {
        pinSemasa = "";
        document.getElementById('pin-input').value = "";
        document.getElementById('login-status').innerText = "";
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('tindakan-admin').classList.add('hidden');
        document.getElementById('tindakan-user').classList.add('hidden');
    }

    function bukaModalTransaksi(jenisDefault) {
        document.getElementById('modal-transaksi').classList.remove('hidden');
        document.getElementById('input-jenis').value = jenisDefault;
        document.getElementById('status-hantar').innerText = "";
        
        if (jenisDefault === "Bayar Hutang") {
            document.getElementById('input-jumlah').value = "500.00";
            document.getElementById('input-nota').value = "Bayaran bulanan";
        } else {
            document.getElementById('input-jumlah').value = "";
            document.getElementById('input-nota').value = "";
        }
        kemasKiniKategori();
    }

    function tutupModal() {
        document.getElementById('modal-transaksi').classList.add('hidden');
    }

    function kemasKiniKategori() {
        const jenis = document.getElementById('input-jenis').value;
        const selectKategori = document.getElementById('input-kategori');
        selectKategori.innerHTML = ""; 
        
        if (jenis === "Bayar Hutang") {
            selectKategori.innerHTML = '<option value="Kepada Abah">Kepada Abah</option>';
        } else if (jenis === "Pendapatan") {
            selectKategori.innerHTML = `
                <option value="Pendapatan Hasif">Pendapatan Hasif</option>
                <option value="Pendapatan Fatini">Pendapatan Fatini</option>
                <option value="Lain-lain">Lain-lain</option>
            `;
        } else {
            if(senaraiKategoriGlobal.length > 0) {
                senaraiKategoriGlobal.forEach(kat => {
                    selectKategori.innerHTML += `<option value="${kat.nama}">${kat.nama}</option>`;
                });
            } else {
                selectKategori.innerHTML = '<option value="Lain-lain">Tiada Kategori Ditetapkan</option>';
            }
        }
    }

    function hantarDataTransaksi() {
        const jenis = document.getElementById('input-jenis').value;
        const kategori = document.getElementById('input-kategori').value;
        const jumlah = parseFloat(document.getElementById('input-jumlah').value);
        const nota = document.getElementById('input-nota').value;
        const statusText = document.getElementById('status-hantar');

        if (!jumlah || jumlah <= 0) {
            statusText.innerText = "Sila masukkan jumlah yang sah!";
            statusText.style.color = "red";
            return;
        }

        statusText.innerText = "Sedang menyimpan rekod...";
        statusText.style.color = "blue";
        document.getElementById('btn-hantar').disabled = true;

        const dataHantar = {
            action: "tambahTransaksi",
            pin: pinSemasa,
            jenis: jenis,
            kategori: kategori,
            jumlah: jumlah,
            nota: nota
        };

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(dataHantar),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === "SUCCESS") {
                statusText.innerText = "Berjaya disimpan!";
                statusText.style.color = "green";
                setTimeout(() => {
                    tutupModal();
                    document.getElementById('btn-hantar').disabled = false;
                    // Auto-refresh data dari server untuk kemas kini graf dan senarai
                    logMasuk();
                }, 1500);
            } else {
                statusText.innerText = "Ralat: " + data.message;
                statusText.style.color = "red";
                document.getElementById('btn-hantar').disabled = false;
            }
        })
        .catch(error => {
            statusText.innerText = "Gagal berhubung dengan pelayan.";
            statusText.style.color = "red";
            document.getElementById('btn-hantar').disabled = false;
        });
    }
</script>

</body>
</html>
