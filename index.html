<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekod Dana Keluarga</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2, h3 { margin-top: 0; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button.btn-accent { background-color: var(--accent); }
        button.btn-danger { background-color: var(--danger); }
        .hidden { display: none !important; }
        
        #login-section { text-align: center; margin-top: 50px; }
        #pin-input { text-align: center; font-size: 24px; letter-spacing: 5px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;}
        .balance-box { text-align: center; background-color: var(--primary); color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .balance-box h1 { margin: 10px 0; font-size: 32px; color: #2ecc71; }
        
        /* Gaya Pop-up (Modal) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: var(--card-bg);
            padding: 20px; border-radius: 12px;
            width: 90%; max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .close-btn {
            background-color: transparent; color: var(--danger);
            border: none; text-align: right; padding: 0;
            font-size: 16px; margin-bottom: 10px; font-weight: bold;
        }

        .transaksi-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center;}
        .transaksi-item:last-child { border-bottom: none; }
        .text-accent { color: var(--accent); font-weight: bold; }
        .transaksi-detail { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-section" class="card">
        <h2>Rekod Dana Keluarga</h2>
        <p>Sila masukkan PIN untuk akses</p>
        <input type="password" id="pin-input" placeholder="••••" maxlength="4">
        <button onclick="logMasuk()">Log Masuk</button>
        <p id="login-status" style="color: red;"></p>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="header">
            <h3 id="user-role">Profil: Pengguna</h3>
            <button onclick="logKeluar()" style="width: auto; padding: 8px 12px; background: #95a5a6;">Log Keluar</button>
        </div>

        <div class="balance-box">
            <p style="margin:0; opacity: 0.9;">Jumlah Keseluruhan Dana Terkumpul</p>
            <h1 id="total-dana">RM 0.00</h1>
        </div>

        <!-- Butang Hasif & Fatini -->
        <div id="tindakan-user" class="card hidden">
            <button class="btn-accent" onclick="bukaModalBayar()" style="padding: 15px; font-size: 18px;">+ Masukkan Bayaran (RM 500)</button>
        </div>

        <!-- Butang Abah -->
        <div id="tindakan-admin" class="card hidden">
            <h3 style="margin-bottom: 15px;">Panel Kawalan Abah</h3>
            <button class="btn-danger" onclick="alert('Borang pengeluaran dana akan dibuka')">- Rekod Pengeluaran Dana</button>
            <button onclick="alert('Fungsi cetak dan reset akan dijalankan')">Cetak Laporan PDF</button>
        </div>

        <div class="card">
            <h3>Pecahan Dana Terkumpul</h3>
            <ul style="list-style: none; padding: 0; line-height: 2.0;" id="senarai-dana">
                <!-- Data dimasukkan oleh JS -->
            </ul>
        </div>

        <div class="card">
            <h3>Sejarah Bayaran Terkini</h3>
            <div id="senarai-transaksi">
                <!-- Data Transaksi dimasukkan oleh JS -->
            </div>
        </div>
        
    </div>
</div>

<!-- MODAL BORANG BAYARAN HUTANG -->
<div id="modal-bayar" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="tutupModalBayar()">✖ Batal</button>
        <h3 style="color: var(--primary);">Pengesahan Bayaran</h3>
        
        <label>Jumlah Bayaran (RM):</label>
        <input type="number" id="input-jumlah" value="500.00" step="0.01">

        <label>Catatan / Nota Bulan:</label>
        <input type="text" id="input-nota" value="Bayaran bulanan">

        <button class="btn-accent" onclick="hantarBayaran()" id="btn-hantar" style="margin-top: 15px;">Sahkan Bayaran</button>
        <p id="status-hantar" style="text-align:center; font-size:14px; margin-top:10px;"></p>
    </div>
</div>    

<script>
    // URL WEB APP GAS - KEKALKAN URL INI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybsw0VFwZhmtzDF9sYae9KYkdUROpgV5JyKMWnJLjXhFiW4myZ_l1Q8UadnXcBvnw/exec"; 
    
    let pinSemasa = "";

    function logMasuk() {
        const pin = document.getElementById('pin-input').value;
        const statusText = document.getElementById('login-status');
        
        if(pin.length < 4) {
            statusText.innerText = "Sila masukkan 4 digit PIN.";
            return;
        }

        statusText.innerText = "Memeriksa akses...";
        
        fetch(`${GAS_URL}?pin=${pin}&action=getData`)
            .then(response => response.json())
            .then(data => {
                if(data.status === "SUCCESS") {
                    pinSemasa = pin;
                    paparDashboard(data);
                } else {
                    statusText.innerText = "PIN Salah. Cuba lagi.";
                }
            })
            .catch(error => {
                statusText.innerText = "Ralat sambungan. Pastikan URL betul.";
            });
    }

    function paparDashboard(data) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        
        const peranan = data.peranan;
        document.getElementById('user-role').innerText = peranan === "ADMIN" ? "👑 Panel Kawalan Abah" : "👤 Hasif & Fatini";
        
        // Dapatkan nilai setiap dana
        const dVelozS = parseFloat(data.ringkasan["Dana Servis Veloz"] || 0);
        const dPersonaS = parseFloat(data.ringkasan["Dana Servis Persona"] || 0);
        const dVelozR = parseFloat(data.ringkasan["Dana Roadtax Veloz"] || 0);
        const dPersonaR = parseFloat(data.ringkasan["Dana Roadtax Persona"] || 0);
        const dTabungan = parseFloat(data.ringkasan["Tabungan Masa Depan"] || 0);

        // Kira Jumlah Keseluruhan Dana
        const totalDana = dVelozS + dPersonaS + dVelozR + dPersonaR + dTabungan;
        document.getElementById('total-dana').innerText = "RM " + totalDana.toFixed(2);

        // Papar Pecahan Dana
        document.getElementById('senarai-dana').innerHTML = `
            <li>🚗 Servis Veloz: <b style="float:right;">RM ${dVelozS.toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li>🚗 Servis Persona: <b style="float:right;">RM ${dPersonaS.toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li>📄 Roadtax Veloz: <b style="float:right;">RM ${dVelozR.toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li>📄 Roadtax Persona: <b style="float:right;">RM ${dPersonaR.toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}</li>
            <li style="color: var(--accent); font-size: 18px; margin-top: 15px; border-top: 2px dashed #eee; padding-top: 10px;">
                💰 Tabungan Masa Depan: <b style="float:right;">RM ${dTabungan.toFixed(2)}</b> ${peranan === 'USER' ? '🔒' : ''}
            </li>
        `;

        // Susun akses butang
        if(peranan === "ADMIN") {
            document.getElementById('tindakan-admin').classList.remove('hidden');
            document.getElementById('tindakan-user').classList.add('hidden');
        } else {
            document.getElementById('tindakan-user').classList.remove('hidden');
            document.getElementById('tindakan-admin').classList.add('hidden');
        }

        // Papar Senarai Sejarah Bayaran (Tapis hanya Bayar Hutang)
        const sejarahTransaksi = data.transaksi || [];
        let htmlTransaksi = "";
        let adaRekod = false;

        sejarahTransaksi.forEach(t => {
            if (t.jenis === "Bayar Hutang") {
                adaRekod = true;
                htmlTransaksi += `
                    <div class="transaksi-item">
                        <div>
                            <div style="font-weight:bold; font-size: 14px;">Masuk Dana</div>
                            <div class="transaksi-detail">${t.tarikh} • ${t.nota || ''}</div>
                        </div>
                        <div class="text-accent">+ RM ${parseFloat(t.jumlah).toFixed(2)}</div>
                    </div>
                `;
            }
        });

        if (!adaRekod) {
            htmlTransaksi = "<p style='text-align:center; color:#7f8c8d; font-size:14px;'>Belum ada rekod bayaran.</p>";
        }
        document.getElementById('senarai-transaksi').innerHTML = htmlTransaksi;
    }

    function logKeluar() {
        pinSemasa = "";
        document.getElementById('pin-input').value = "";
        document.getElementById('login-status').innerText = "";
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
    }

    function bukaModalBayar() {
        document.getElementById('modal-bayar').classList.remove('hidden');
        document.getElementById('status-hantar').innerText = "";
        document.getElementById('input-jumlah').value = "500.00";
        document.getElementById('input-nota').value = "Bayaran bulanan";
    }

    function tutupModalBayar() {
        document.getElementById('modal-bayar').classList.add('hidden');
    }

    function hantarBayaran() {
        const jumlah = parseFloat(document.getElementById('input-jumlah').value);
        const nota = document.getElementById('input-nota').value;
        const statusText = document.getElementById('status-hantar');

        if (!jumlah || jumlah <= 0) {
            statusText.innerText = "Sila pastikan jumlah sah!";
            statusText.style.color = "red";
            return;
        }

        statusText.innerText = "Sedang merekod bayaran...";
        statusText.style.color = "blue";
        document.getElementById('btn-hantar').disabled = true;

        const dataHantar = {
            action: "tambahTransaksi",
            pin: pinSemasa,
            jenis: "Bayar Hutang",
            kategori: "Kepada Abah",
            jumlah: jumlah,
            nota: nota
        };

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(dataHantar),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === "SUCCESS") {
                statusText.innerText = "Bayaran berjaya direkodkan!";
                statusText.style.color = "green";
                setTimeout(() => {
                    tutupModalBayar();
                    document.getElementById('btn-hantar').disabled = false;
                    logMasuk(); // Refresh paparan
                }, 1500);
            } else {
                statusText.innerText = "Ralat: " + data.message;
                statusText.style.color = "red";
                document.getElementById('btn-hantar').disabled = false;
            }
        })
        .catch(error => {
            statusText.innerText = "Gagal berhubung dengan pelayan.";
            statusText.style.color = "red";
            document.getElementById('btn-hantar').disabled = false;
        });
    }
</script>

</body>
</html>
